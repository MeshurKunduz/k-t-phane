<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erinyeler Kütüphane - Ekibimiz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ekip sayfası için özel grid ayarı */
        .team-page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
            padding: 20px 0;
        }
        .team-page-grid .team-modal-member {
            animation: memberFadeIn 0.6s ease forwards;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="loader-wrapper">
        <div class="loader"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">👁️ Erinyeler Kütüphane</a>
        <ul class="nav-links">
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><a href="mitoloji.html">Mitoloji (Wiki)</a></li>
            <li><a href="hakkimizda.html">Hakkımızda</a></li>
            <li><a href="https://discord.gg/caXr8amGg2" target="_blank" class="discord-button-glow">Discord'a Katıl</a></li>
        </ul>
    </nav>

    <div class="container">
        <div style="text-align: left; margin-bottom: 40px;">
            <h1 id="teamTitle" style="color: #c5a880; font-size: 3rem;">Ekibimiz</h1>
            <p id="teamDesc" style="color: #95a5a6; font-size: 1.2rem;">Erinyeler Kütüphane'nin arkasındaki güçler.</p>
        </div>

        <div id="teamGrid" class="team-page-grid">
            <!-- JS ile doldurulacak -->
        </div>

        <div style="margin-top: 50px; text-align: left;">
            <a href="hakkimizda.html" style="color: var(--accent-color); text-decoration: none; border: 1px solid var(--accent-color); padding: 10px 25px; border-radius: 5px; transition: 0.3s;" onmouseover="this.style.background='var(--accent-color)'; this.style.color='var(--bg-color)'" onmouseout="this.style.background='transparent'; this.style.color='var(--accent-color)'">← Geri Dön</a>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Erinyeler Kütüphane. Tüm hakları saklıdır.</p>
            <ul class="footer-links">
                <li><a href="iletisim.html">İletişim</a></li>
                <li><a href="hakkimizda.html">Hakkımızda</a></li>
                <li><a href="gizlilik-politikasi.html">Gizlilik Politikası</a></li>
            </ul>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => { 
            document.querySelector('.loader-wrapper').classList.add('loader-hidden'); 
            renderTeam();
        });

        const teamData = {
            'Yonetim': {
                title: 'Yönetim Ekibi',
                members: [
                    { name: 'ErBörü', title: 'Kurucu', avatar: 'avatars/erboru.png' },
                    { name: 'Ra', title: 'Geliştirici', avatar: 'avatars/Ra.png' }
                ]
            },
            'Muhafizlar': {
                title: 'Muhafızlar',
                members: [
                    { name: 'Cankan', title: 'Yönetici', avatar: 'avatars/cankan.png' },
                    { name: 'herry_00', title: 'Yönetici', avatar: 'avatars/herry_00.png' },
                    { name: 'ishigami._.', title: 'Yönetici', avatar: 'avatars/ishigami.png' },
                    { name: 'bohalbayi', title: 'Yönetici', avatar: 'avatars/bohalbayi.png' },
                    { name: 'sait_trman.', title: 'Yönetici', avatar: 'avatars/sait_trman.png' }
                ]
            },
            'Amon': {
                title: 'Amon Sistemi',
                members: [
                    { name: 'Amon', title: 'Sistem Botu & Gözcü', avatar: 'avatars/amon.png' },
                    { name: 'Erinyeler', title: 'Sistem Botu', avatar: 'avatars/erinyeler.png' },
                    { name: 'Sınır', title: 'Sistem Botu', avatar: 'avatars/sinir.png' }
                ]
            }
        };

        function renderTeam() {
            const params = new URLSearchParams(window.location.search);
            const teamKey = params.get('team') || 'Muhafizlar';
            const team = teamData[teamKey];

            if (team) {
                document.getElementById('teamTitle').innerText = team.title;
                const grid = document.getElementById('teamGrid');
                grid.innerHTML = team.members.map((m, i) => `
                    <div class="team-modal-member" style="animation-delay: ${i * 0.1}s">
                        <img src="${m.avatar}" alt="${m.name}">
                        <div class="team-modal-member-info">
                            <h4>${m.name}</h4>
                            <p>${m.title}</p>
                        </div>
                    </div>`).join('');
            }
        }
    </script>
    <script src="music.js" defer></script>
</body>
</html>
